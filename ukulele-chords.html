<!DOCTYPE html>
<html lang="en">
<head>
<script src="/analytics.js" defer></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ukulele Chords — Music Arcade</title>
<meta name="description" content="Basic ukulele chords with dots colour-coded by finger, and a hand key for reference. Built by William Troy." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F3F7F6; --ink:#28313B; --muted:#6b7488; --acc:#0E9AA7; --acc-tint:#DBF0F1;
    --f1:#2E77E6; --f2:#E0922A; --f3:#1F9D55; --f4:#B159D6;
    --disp:'Fredoka',system-ui,sans-serif; --body:'Nunito',system-ui,sans-serif; --mono:'Space Mono',monospace;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; }
  body{ background:var(--bg); color:var(--ink); font-family:var(--body); line-height:1.5;
    -webkit-font-smoothing:antialiased; min-height:100vh; }
  .wrap{ max-width:860px; margin:0 auto; padding:22px 16px 70px; }

  .tabs{ display:flex; gap:10px; justify-content:center; margin-bottom:20px; flex-wrap:wrap; }
  .tabs a{ font-family:var(--disp); font-weight:600; font-size:.82rem; text-decoration:none; color:var(--ink);
    background:#fff; padding:8px 18px; border-radius:999px; box-shadow:0 3px 0 rgba(40,49,59,.12); transition:transform .12s; }
  .tabs a:hover{ transform:translateY(-2px); }
  .tabs a.cur{ background:var(--acc); color:#fff; box-shadow:0 3px 0 #0b7c86; }

  header.top{ text-align:center; margin-bottom:6px; }
  .kicker{ display:inline-block; font-family:var(--disp); font-weight:600; font-size:.78rem;
    letter-spacing:.08em; text-transform:uppercase; color:var(--acc); background:var(--acc-tint);
    padding:5px 14px; border-radius:999px; }
  h1{ font-family:var(--disp); font-weight:700; font-size:clamp(2rem,6vw,3rem); margin:.45rem 0 .2rem; }
  .lede{ max-width:52ch; margin:.3rem auto 0; color:var(--muted); font-weight:600; }
  .hint{ text-align:center; font-family:var(--mono); font-size:.72rem; color:var(--muted); margin-top:10px; }

  .rule{ border-top:1px solid #dbe2e0; margin:16px 0 20px; }

  /* hand key (below the chords) */
  .handcard{ background:#fff; border-radius:18px; padding:14px; box-shadow:0 6px 18px rgba(20,30,60,.09);
    margin-top:26px; }
  .hand-img{ display:block; width:100%; max-width:640px; height:auto; margin:0 auto; }

  /* chord grid */
  .ukegrid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(138px,1fr)); gap:16px; }
  .uchord{ background:#fff; border:1px solid #e6ecea; border-radius:14px; padding:12px 10px 12px; text-align:center;
    box-shadow:0 3px 10px rgba(20,30,60,.06); cursor:pointer; break-inside:avoid;
    transition:transform .12s, box-shadow .12s; }
  .uchord:hover{ transform:translateY(-2px); box-shadow:0 7px 16px rgba(20,30,60,.12); }
  .uchord h3{ font-family:var(--disp); font-weight:700; font-size:1.35rem; margin:0 0 2px; color:var(--ink); }
  .uchord .fret{ width:100%; height:auto; max-width:118px; margin:4px auto 0; display:block; }

  .foot{ margin-top:30px; text-align:center; font-family:var(--disp); font-weight:500; font-size:.95rem; }
  .foot a{ color:var(--acc); text-decoration:none; }
  .foot a:hover{ text-decoration:underline; }

  @media print{
    .noprint{ display:none !important; }
    body{ background:#fff; } .wrap{ padding:0; max-width:none; }
    .uchord,.handcard{ box-shadow:none; border:1px solid #ccc; }
    @page{ margin:12mm; }
  }
  @media (prefers-reduced-motion: reduce){ *{ transition:none !important; } }
</style>
</head>
<body>

<div class="wrap">

  <nav class="tabs noprint" aria-label="Sections">
    <a href="arcade-index.html">Arcade</a>
    <a href="dojo.html">Dojo</a>
    <a href="resources.html" class="cur" aria-current="page">Resources</a>
  </nav>

  <header class="top">
    <span class="kicker">Ukulele · first chords</span>
    <h1>Ukulele Chords 🌺</h1>
    <p class="lede">Ten chords to get you strumming. Each dot is coloured for the finger you press it with — check the hand.</p>
    <p class="hint noprint">Strings are G · C · E · A. Tap a chord to hear it.</p>
  </header>

  <div class="rule"></div>

  <div class="ukegrid" id="grid"></div>

  <section class="handcard">
    <img class="hand-img" src="finger-guide.png" alt="Which finger? Your fretting hand — 1 index (blue), 2 middle (amber), 3 ring (green), 4 pinky (purple)." />
  </section>

  <p class="foot noprint"><a href="resources.html">← Back to Resources</a></p>

</div>

<script>
(function(){
  var NS='http://www.w3.org/2000/svg';
  function el(t){ return document.createElementNS(NS,t); }
  var FINGER={1:'#2E77E6',2:'#E0922A',3:'#1F9D55',4:'#B159D6'};
  var STRINGS=['G','C','E','A'];
  var OPEN_MIDI=[67,60,64,69]; // reentrant g C E A

  // dots: {s:stringIndex 0=G..3=A, f:fret, fg:finger}
  var UKE=[
    {name:'C',  dots:[{s:3,f:3,fg:3}]},
    {name:'F',  dots:[{s:0,f:2,fg:2},{s:2,f:1,fg:1}]},
    {name:'G',  dots:[{s:1,f:2,fg:1},{s:2,f:3,fg:3},{s:3,f:2,fg:2}]},
    {name:'Am', dots:[{s:0,f:2,fg:2}]},
    {name:'D',  dots:[{s:0,f:2,fg:1},{s:1,f:2,fg:2},{s:2,f:2,fg:3}]},
    {name:'Dm', dots:[{s:2,f:1,fg:1},{s:0,f:2,fg:2},{s:1,f:2,fg:3}]},
    {name:'A',  dots:[{s:1,f:1,fg:1},{s:0,f:2,fg:2}]},
    {name:'Em', dots:[{s:3,f:2,fg:1},{s:2,f:3,fg:2},{s:1,f:4,fg:3}]},
    {name:'E7', dots:[{s:0,f:1,fg:1},{s:1,f:2,fg:2},{s:3,f:2,fg:3}]},
    {name:'G7', dots:[{s:2,f:1,fg:1},{s:1,f:2,fg:2},{s:3,f:2,fg:3}]}
  ];

  // ---- audio ----
  var actx=null;
  function ac(){ actx=actx||new (window.AudioContext||window.webkitAudioContext)(); if(actx.state==='suspended') actx.resume(); return actx; }
  function freq(m){ return 440*Math.pow(2,(m-69)/12); }
  function tone(m,at){ var a=ac(),t=a.currentTime+at,o=a.createOscillator(),g=a.createGain();
    o.type='triangle'; o.frequency.value=freq(m);
    g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.2,t+0.02);
    g.gain.exponentialRampToValueAtTime(0.0001,t+1.5); o.connect(g); g.connect(a.destination); o.start(t); o.stop(t+1.55); }
  function strum(chord){ try{
    var fret=[0,0,0,0]; chord.dots.forEach(function(d){ fret[d.s]=d.f; });
    for(var i=0;i<4;i++) tone(OPEN_MIDI[i]+fret[i], i*0.05);
  }catch(e){} }

  // ---- diagram ----
  function diagram(chord){
    var padL=20, padT=24, sGap=19, fretGap=23, nFrets=4, nS=4;
    var boardW=(nS-1)*sGap, boardH=nFrets*fretGap, W=padL+boardW+16, H=padT+boardH+22, nutY=padT;
    var xs=[]; for(var i=0;i<nS;i++) xs.push(padL+i*sGap);
    var svg=el('svg'); svg.setAttribute('viewBox','0 0 '+W+' '+H); svg.setAttribute('class','fret');
    for(var k=0;k<=nFrets;k++){ var y=nutY+k*fretGap, l=el('line');
      l.setAttribute('x1',xs[0]); l.setAttribute('x2',xs[nS-1]); l.setAttribute('y1',y); l.setAttribute('y2',y);
      l.setAttribute('stroke','#b3bccb'); l.setAttribute('stroke-width',k===0?4.5:1.6); l.setAttribute('stroke-linecap','round'); svg.appendChild(l); }
    for(var i=0;i<nS;i++){ var l=el('line'); l.setAttribute('x1',xs[i]); l.setAttribute('x2',xs[i]);
      l.setAttribute('y1',nutY); l.setAttribute('y2',nutY+boardH); l.setAttribute('stroke','#b3bccb'); l.setAttribute('stroke-width',1.4); svg.appendChild(l); }
    var has={}; chord.dots.forEach(function(d){ has[d.s]=true; });
    // open markers
    for(var i=0;i<nS;i++){ if(!has[i]){ var c=el('circle'); c.setAttribute('cx',xs[i]); c.setAttribute('cy',nutY-9);
      c.setAttribute('r',5); c.setAttribute('fill','none'); c.setAttribute('stroke','#9aa3b2'); c.setAttribute('stroke-width',1.8); svg.appendChild(c); } }
    // finger dots
    chord.dots.forEach(function(d){
      var x=xs[d.s], y=nutY+(d.f-0.5)*fretGap, col=FINGER[d.fg];
      var c=el('circle'); c.setAttribute('cx',x); c.setAttribute('cy',y); c.setAttribute('r',9); c.setAttribute('fill',col); svg.appendChild(c);
      var t=el('text'); t.setAttribute('x',x); t.setAttribute('y',y+3.6); t.setAttribute('text-anchor','middle');
      t.setAttribute('font-family',"'Nunito',sans-serif"); t.setAttribute('font-weight','800'); t.setAttribute('font-size','11'); t.setAttribute('fill','#fff');
      t.textContent=d.fg; svg.appendChild(t);
    });
    // string labels
    for(var i=0;i<nS;i++){ var t=el('text'); t.setAttribute('x',xs[i]); t.setAttribute('y',nutY+boardH+15); t.setAttribute('text-anchor','middle');
      t.setAttribute('font-family',"'Space Mono',monospace"); t.setAttribute('font-size','9'); t.setAttribute('fill','#9aa3b2'); t.textContent=STRINGS[i]; svg.appendChild(t); }
    return svg;
  }

  var grid=document.getElementById('grid');
  UKE.forEach(function(chord){
    var box=document.createElement('div'); box.className='uchord';
    box.setAttribute('role','button'); box.setAttribute('tabindex','0'); box.setAttribute('aria-label',chord.name+' chord');
    var h=document.createElement('h3'); h.textContent=chord.name; box.appendChild(h);
    box.appendChild(diagram(chord));
    function hit(){ strum(chord); }
    box.addEventListener('click',hit);
    box.addEventListener('keydown',function(e){ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); hit(); } });
    grid.appendChild(box);
  });
})();
</script>
</body>
</html>
