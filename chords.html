<!DOCTYPE html>
<html lang="en">
<head>
<script src="/analytics.js" defer></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chords — Music Arcade</title>
<meta name="description" content="A reference sheet of every major and minor chord for piano and guitar, laid out around the circle of fifths. Built by William Troy." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#EEF2F8; --ink:#2A3242; --muted:#6b7488;
    --maj:#2657C4; --maj-tint:#E3EBFB; --min:#C0417E; --min-tint:#FBE4EF;
    --disp:'Fredoka',system-ui,sans-serif; --body:'Nunito',system-ui,sans-serif; --mono:'Space Mono',monospace;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; }
  body{ background:var(--bg); color:var(--ink); font-family:var(--body); line-height:1.5;
    -webkit-font-smoothing:antialiased; min-height:100vh; }
  .wrap{ max-width:820px; margin:0 auto; padding:22px 16px 70px; }

  /* site tabs */
  .tabs{ display:flex; gap:10px; justify-content:center; margin-bottom:20px; flex-wrap:wrap; }
  .tabs a{ font-family:var(--disp); font-weight:600; font-size:.82rem; text-decoration:none; color:var(--ink);
    background:#fff; padding:8px 18px; border-radius:999px; box-shadow:0 3px 0 rgba(42,50,66,.12); transition:transform .12s; }
  .tabs a:hover{ transform:translateY(-2px); }
  .tabs a.cur{ background:var(--maj); color:#fff; box-shadow:0 3px 0 #1c48a3; }

  header.top{ text-align:center; margin-bottom:6px; }
  .kicker{ display:inline-block; font-family:var(--disp); font-weight:600; font-size:.78rem;
    letter-spacing:.08em; text-transform:uppercase; color:var(--min);
    background:var(--min-tint); padding:5px 14px; border-radius:999px; }
  h1{ font-family:var(--disp); font-weight:700; font-size:clamp(2rem,6vw,3rem); margin:.45rem 0 .2rem; }
  .lede{ max-width:52ch; margin:.3rem auto 0; color:var(--muted); font-weight:600; }

  /* instrument tabs */
  .insttabs{ display:flex; justify-content:center; margin:18px 0 12px; }
  .insttabs .seg{ display:inline-flex; background:#fff; border-radius:999px; padding:4px;
    box-shadow:0 2px 7px rgba(20,30,60,.12); }
  .insttabs button{ border:none; background:transparent; font-family:var(--disp); font-weight:600;
    font-size:.92rem; padding:9px 26px; border-radius:999px; cursor:pointer; color:var(--muted); transition:color .15s; }
  .insttabs button.on{ background:var(--ink); color:#fff; }

  /* toolbar: highlight + print */
  .toolbar{ display:flex; gap:12px 18px; justify-content:center; align-items:center; flex-wrap:wrap; margin:2px 0 6px; }
  .tlabel{ font-family:var(--disp); font-weight:600; font-size:.85rem; color:var(--ink); }
  .degs{ display:inline-flex; gap:8px; }
  .degs button{ font-family:var(--disp); font-weight:600; font-size:.82rem; padding:8px 16px; border-radius:999px;
    cursor:pointer; border:2px solid #cfd6e2; background:#fff; color:var(--ink); transition:all .13s; }
  .degs button:hover{ border-color:var(--ink); }
  .degs button.on{ background:var(--ink); border-color:var(--ink); color:#fff; }
  .printbtn{ font-family:var(--disp); font-weight:600; font-size:.82rem; cursor:pointer; border:none;
    color:#fff; background:var(--maj); padding:9px 18px; border-radius:999px; box-shadow:0 3px 0 #1c48a3; }
  .printbtn:active{ transform:translateY(3px); box-shadow:none; }
  .legend{ font-family:var(--mono); font-size:.7rem; color:var(--muted); width:100%; text-align:center; }
  .legend b{ color:var(--ink); }

  .rule{ border-top:1px solid #d6dce7; margin:12px 0 18px; }

  /* sheets */
  .sheet{ display:grid; grid-template-columns:1fr 1fr; gap:14px 16px; }
  #chart[data-inst="piano"] #sheetGuitar{ display:none; }
  #chart[data-inst="guitar"] #sheetPiano{ display:none; }
  .colhead{ font-family:var(--disp); font-weight:700; font-size:1.05rem; text-align:center;
    padding:7px; border-radius:10px; }
  .colhead.maj{ color:var(--maj); background:var(--maj-tint); }
  .colhead.min{ color:var(--min); background:var(--min-tint); }

  .chord{ background:#fff; border:1px solid #e5e9f1; border-radius:14px; padding:11px 11px 13px;
    text-align:center; box-shadow:0 3px 10px rgba(20,30,60,.06); cursor:pointer; break-inside:avoid;
    transition:transform .12s, box-shadow .12s; }
  .chord:hover{ transform:translateY(-2px); box-shadow:0 7px 16px rgba(20,30,60,.13); }
  .chord.maj{ border-top:4px solid var(--maj); }
  .chord.min{ border-top:4px solid var(--min); }
  .chord h3{ font-family:var(--disp); font-weight:700; font-size:1.1rem; margin:0; line-height:1.1; }
  .chord .qual{ font-weight:600; font-size:.9rem; }
  .chord.maj .qual{ color:var(--maj); } .chord.min .qual{ color:var(--min); }
  .chord .nm{ font-family:var(--mono); font-size:.72rem; font-weight:700; letter-spacing:.02em;
    color:var(--muted); margin-top:3px; }
  .kbd{ width:100%; height:auto; max-width:210px; margin:9px auto 0; display:block; }
  .fret{ width:100%; height:auto; max-width:132px; margin:8px auto 0; display:block; }

  /* highlight spotlight */
  .mark{ transition:opacity .18s; }
  [data-hl="1"] .mark:not([data-deg="1"]),
  [data-hl="3"] .mark:not([data-deg="3"]),
  [data-hl="5"] .mark:not([data-deg="5"]){ opacity:.12; }
  [data-hl="1"] rect.keytint:not([data-deg="1"]),
  [data-hl="3"] rect.keytint:not([data-deg="3"]),
  [data-hl="5"] rect.keytint:not([data-deg="5"]){ fill:#fff; }
  [data-hl="1"] rect.keyblk:not([data-deg="1"]),
  [data-hl="3"] rect.keyblk:not([data-deg="3"]),
  [data-hl="5"] rect.keyblk:not([data-deg="5"]){ fill:#2A3242; }

  .foot{ margin-top:30px; text-align:center; font-family:var(--disp); font-weight:500; font-size:.95rem; }
  .foot a{ color:var(--maj); text-decoration:none; }
  .foot a:hover{ text-decoration:underline; }

  @media (max-width:420px){ .kbd{ max-width:165px; } .chord h3{ font-size:1rem; } }

  @media print{
    .noprint{ display:none !important; }
    body{ background:#fff; }
    .wrap{ padding:0; max-width:none; }
    .chord{ box-shadow:none; border:1px solid #ccc; }
    .sheet{ gap:8px 10px; }
    @page{ margin:12mm; }
  }
  @media (prefers-reduced-motion: reduce){ *{ transition:none !important; } }
</style>
</head>
<body>

<div class="wrap">

  <nav class="tabs noprint" aria-label="Sections">
    <a href="arcade-index.html">Arcade</a>
    <a href="dojo.html">Dojo</a>
    <a href="resources.html" class="cur" aria-current="page">Resources</a>
  </nav>

  <header class="top">
    <span class="kicker">Reference sheet</span>
    <h1>Chords 🎹🎸</h1>
    <p class="lede">Every major &amp; minor chord, starting on F and C, then travelling around the circle of fifths.</p>
  </header>

  <div class="insttabs noprint">
    <div class="seg" role="group" aria-label="Instrument">
      <button data-inst="piano" class="on">🎹 Piano</button>
      <button data-inst="guitar">🎸 Guitar</button>
    </div>
  </div>

  <div class="toolbar noprint">
    <span class="tlabel">Spotlight</span>
    <div class="degs" role="group" aria-label="Highlight chord tone">
      <button data-deg="1">Root</button>
      <button data-deg="3">Third</button>
      <button data-deg="5">Fifth</button>
    </div>
    <button class="printbtn" onclick="window.print()">🖨 Print</button>
    <span class="legend">Numbers are chord tones — <b>1</b> root · <b>3</b> third · <b>5</b> fifth. Tap a chord to hear it.</span>
  </div>

  <div class="rule"></div>

  <div id="chart" data-inst="piano">
    <div class="sheet" id="sheetPiano"></div>
    <div class="sheet" id="sheetGuitar"></div>
  </div>

  <p class="foot noprint"><a href="resources.html">← Back to Resources</a></p>

</div>

<script>
(function(){
  var NS='http://www.w3.org/2000/svg';
  function el(t){ return document.createElementNS(NS,t); }
  var WHITE_ORDER=[0,2,4,5,7,9,11];
  function isBlack(pc){ return pc===1||pc===3||pc===6||pc===8||pc===10; }
  function degreeOf(pc, rootPc, thirdInt){
    var d=(pc-rootPc+12)%12;
    if(d===0) return '1'; if(d===thirdInt) return '3'; if(d===7) return '5'; return null;
  }

  // circle-of-fifths order, F then C
  var ROOTS=[
    {pc:5,name:'F'},{pc:0,name:'C'},{pc:7,name:'G'},{pc:2,name:'D'},{pc:9,name:'A'},{pc:4,name:'E'},
    {pc:11,name:'B'},{pc:6,name:'F♯ / G♭'},{pc:1,name:'D♭ / C♯'},{pc:8,name:'A♭ / G♯'},
    {pc:3,name:'E♭ / D♯'},{pc:10,name:'B♭ / A♯'}
  ];
  var MAJ={5:'F · A · C',0:'C · E · G',7:'G · B · D',2:'D · F♯ · A',9:'A · C♯ · E',4:'E · G♯ · B',
           11:'B · D♯ · F♯',6:'F♯ · A♯ · C♯',1:'D♭ · F · A♭',8:'A♭ · C · E♭',3:'E♭ · G · B♭',10:'B♭ · D · F'};
  var MIN={5:'F · A♭ · C',0:'C · E♭ · G',7:'G · B♭ · D',2:'D · F · A',9:'A · C · E',4:'E · G · B',
           11:'B · D · F♯',6:'F♯ · A · C♯',1:'C♯ · E · G♯',8:'G♯ · B · D♯',3:'E♭ · G♭ · B♭',10:'B♭ · D♭ · F'};

  // guitar voicings: frets for strings 6..1 (low E→high E); -1 = mute, 0 = open. base = lowest fret shown.
  var G_OPEN_PC=[4,9,2,7,11,4], G_OPEN_MIDI=[40,45,50,55,59,64];
  var GMAJ={
    5:{f:[1,3,3,2,1,1],b:1}, 0:{f:[-1,3,2,0,1,0],b:1}, 7:{f:[3,2,0,0,0,3],b:1},
    2:{f:[-1,-1,0,2,3,2],b:1}, 9:{f:[-1,0,2,2,2,0],b:1}, 4:{f:[0,2,2,1,0,0],b:1},
    11:{f:[-1,2,4,4,4,2],b:1}, 6:{f:[2,4,4,3,2,2],b:1}, 1:{f:[-1,4,6,6,6,4],b:4},
    8:{f:[4,6,6,5,4,4],b:4}, 3:{f:[-1,6,8,8,8,6],b:6}, 10:{f:[-1,1,3,3,3,1],b:1}
  };
  var GMIN={
    5:{f:[1,3,3,1,1,1],b:1}, 0:{f:[-1,3,5,5,4,3],b:3}, 7:{f:[3,5,5,3,3,3],b:3},
    2:{f:[-1,-1,0,2,3,1],b:1}, 9:{f:[-1,0,2,2,1,0],b:1}, 4:{f:[0,2,2,0,0,0],b:1},
    11:{f:[-1,2,4,4,3,2],b:1}, 6:{f:[2,4,4,2,2,2],b:1}, 1:{f:[-1,4,6,6,5,4],b:4},
    8:{f:[4,6,6,4,4,4],b:4}, 3:{f:[-1,6,8,8,7,6],b:6}, 10:{f:[-1,1,3,3,2,1],b:1}
  };

  // ---- audio ----
  var actx=null;
  function ac(){ actx=actx||new (window.AudioContext||window.webkitAudioContext)(); if(actx.state==='suspended') actx.resume(); return actx; }
  function freq(m){ return 440*Math.pow(2,(m-69)/12); }
  function tone(m, at, dur){
    var a=ac(), t=a.currentTime+at, o=a.createOscillator(), g=a.createGain();
    o.type='triangle'; o.frequency.value=freq(m);
    g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.2,t+0.02);
    g.gain.exponentialRampToValueAtTime(0.0001,t+dur); o.connect(g); g.connect(a.destination);
    o.start(t); o.stop(t+dur+0.05);
  }
  function playPiano(rootPc, thirdInt){ try{ [0,thirdInt,7].forEach(function(iv,k){ tone(60+rootPc+iv, k*0.045, 1.4); }); }catch(e){} }
  function playGuitar(frets){ try{ var k=0; for(var i=0;i<6;i++){ if(frets[i]>=0){ tone(G_OPEN_MIDI[i]+frets[i], k*0.05, 1.6); k++; } } }catch(e){} }

  // ---- markers ----
  function mark(parent,cx,cy,r,label,fill,stroke,txt,deg){
    var g=el('g'); g.setAttribute('class','mark'); if(deg) g.setAttribute('data-deg',deg);
    var c=el('circle'); c.setAttribute('cx',cx); c.setAttribute('cy',cy); c.setAttribute('r',r); c.setAttribute('fill',fill);
    if(stroke){ c.setAttribute('stroke',stroke); c.setAttribute('stroke-width',2); }
    g.appendChild(c);
    var t=el('text'); t.setAttribute('x',cx); t.setAttribute('y',cy+3.4); t.setAttribute('text-anchor','middle');
    t.setAttribute('font-family',"'Nunito',sans-serif"); t.setAttribute('font-weight','800');
    t.setAttribute('font-size', r>=8?'10.5':'9.5'); t.setAttribute('fill',txt); t.textContent=label||'';
    g.appendChild(t); parent.appendChild(g);
  }

  // ---- piano keyboard ----
  function keyboard(rootPc, thirdInt, accent, tint){
    var wW=22,wH=94,bW=13,bH=59,n=7;
    var base=isBlack(rootPc)?(rootPc+11)%12:rootPc, start=WHITE_ORDER.indexOf(base), seq=[];
    for(var i=0;i<n;i++) seq.push(WHITE_ORDER[(start+i)%7]);
    var deg={}; deg[rootPc]='1'; deg[(rootPc+thirdInt)%12]='3'; deg[(rootPc+7)%12]='5';
    var svg=el('svg'); svg.setAttribute('viewBox','0 0 '+(n*wW)+' '+(wH+2)); svg.setAttribute('class','kbd');
    for(var i=0;i<n;i++){
      var pc=seq[i], x=i*wW, d=deg[pc];
      var r=el('rect'); r.setAttribute('x',x); r.setAttribute('y',0); r.setAttribute('width',wW); r.setAttribute('height',wH);
      r.setAttribute('rx',3); r.setAttribute('stroke','#c7cfdb'); r.setAttribute('stroke-width',1.4);
      if(d){ r.setAttribute('fill',tint); r.setAttribute('class','keytint'); r.setAttribute('data-deg',d); } else r.setAttribute('fill','#fff');
      svg.appendChild(r);
      if(d) mark(svg, x+wW/2, wH-15, 8, d, accent, null, '#fff', d);
    }
    for(var i=0;i<n-1;i++){
      var a=seq[i], b=seq[i+1];
      if(((b-a+12)%12)===2){
        var bpc=(a+1)%12, bx=(i+1)*wW-bW/2, d=deg[bpc];
        var rr=el('rect'); rr.setAttribute('x',bx); rr.setAttribute('y',0); rr.setAttribute('width',bW); rr.setAttribute('height',bH);
        rr.setAttribute('rx',2);
        if(d){ rr.setAttribute('fill',accent); rr.setAttribute('class','keyblk'); rr.setAttribute('data-deg',d); } else rr.setAttribute('fill','#2A3242');
        svg.appendChild(rr);
        if(d) mark(svg, bx+bW/2, bH-11, 7.5, d, '#fff', null, accent, d);
      }
    }
    return svg;
  }

  // ---- guitar diagram ----
  function guitar(frets, base, rootPc, thirdInt, accent){
    var padL=26, padT=26, sGap=15, fretGap=22, nFrets=4;
    var boardW=5*sGap, boardH=nFrets*fretGap, W=padL+boardW+12, H=padT+boardH+14, nutY=padT;
    var xs=[]; for(var i=0;i<6;i++) xs.push(padL+i*sGap);
    var svg=el('svg'); svg.setAttribute('viewBox','0 0 '+W+' '+H); svg.setAttribute('class','fret');
    for(var k=0;k<=nFrets;k++){
      var y=nutY+k*fretGap, l=el('line');
      l.setAttribute('x1',xs[0]); l.setAttribute('x2',xs[5]); l.setAttribute('y1',y); l.setAttribute('y2',y);
      l.setAttribute('stroke','#b3bccb'); l.setAttribute('stroke-width',(k===0&&base===1)?4.5:1.6); l.setAttribute('stroke-linecap','round');
      svg.appendChild(l);
    }
    for(var i=0;i<6;i++){
      var l=el('line'); l.setAttribute('x1',xs[i]); l.setAttribute('x2',xs[i]);
      l.setAttribute('y1',nutY); l.setAttribute('y2',nutY+boardH); l.setAttribute('stroke','#b3bccb'); l.setAttribute('stroke-width',1.4);
      svg.appendChild(l);
    }
    if(base>1){
      var t=el('text'); t.setAttribute('x',padL-9); t.setAttribute('y',nutY+fretGap*0.62); t.setAttribute('text-anchor','end');
      t.setAttribute('font-family',"'Space Mono',monospace"); t.setAttribute('font-size','10'); t.setAttribute('fill','#6b7488');
      t.textContent=base+'fr'; svg.appendChild(t);
    }
    for(var i=0;i<6;i++){
      var f=frets[i], x=xs[i];
      if(f===-1){
        var t=el('text'); t.setAttribute('x',x); t.setAttribute('y',nutY-6); t.setAttribute('text-anchor','middle');
        t.setAttribute('font-family',"'Space Mono',monospace"); t.setAttribute('font-size','11'); t.setAttribute('fill','#9aa3b2');
        t.textContent='×'; svg.appendChild(t); continue;
      }
      var pc=(G_OPEN_PC[i]+f)%12, deg=degreeOf(pc, rootPc, thirdInt);
      if(f===0){ mark(svg, x, nutY-9, 7, deg, '#fff', accent, accent, deg); }
      else { mark(svg, x, nutY+(f-base+0.5)*fretGap, 8, deg, accent, null, '#fff', deg); }
    }
    return svg;
  }

  // ---- build cells ----
  function head(sheet,txt,cls){ var d=document.createElement('div'); d.className='colhead '+cls; d.textContent=txt; sheet.appendChild(d); }
  function cell(sheet, root, isMinor, kind){
    var accentMaj=cssv('--maj'), tintMaj=cssv('--maj-tint'), accentMin=cssv('--min'), tintMin=cssv('--min-tint');
    var accent=isMinor?accentMin:accentMaj, tint=isMinor?tintMin:tintMaj, thirdInt=isMinor?3:4, q=isMinor?'minor':'major';
    var box=document.createElement('div'); box.className='chord '+(isMinor?'min':'maj');
    box.setAttribute('role','button'); box.setAttribute('tabindex','0');
    box.setAttribute('aria-label', root.name.replace(' / ',' or ')+' '+q+' chord');
    var h=document.createElement('h3'); h.innerHTML=root.name+' <span class="qual">'+q+'</span>'; box.appendChild(h);
    var nm=document.createElement('div'); nm.className='nm'; nm.textContent=(isMinor?MIN:MAJ)[root.pc]; box.appendChild(nm);
    var hit;
    if(kind==='piano'){
      box.appendChild(keyboard(root.pc, thirdInt, accent, tint));
      hit=function(){ playPiano(root.pc, thirdInt); };
    } else {
      var g=(isMinor?GMIN:GMAJ)[root.pc];
      box.appendChild(guitar(g.f, g.b, root.pc, thirdInt, accent));
      hit=function(){ playGuitar(g.f); };
    }
    box.addEventListener('click', hit);
    box.addEventListener('keydown', function(e){ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); hit(); } });
    sheet.appendChild(box);
  }
  function cssv(v){ return getComputedStyle(document.documentElement).getPropertyValue(v).trim(); }

  function build(sheetId, kind){
    var sheet=document.getElementById(sheetId);
    head(sheet,'Major','maj'); head(sheet,'Minor','min');
    ROOTS.forEach(function(r){ cell(sheet,r,false,kind); cell(sheet,r,true,kind); });
  }
  build('sheetPiano','piano');
  build('sheetGuitar','guitar');

  // ---- instrument tabs ----
  var chart=document.getElementById('chart');
  document.querySelectorAll('.insttabs button').forEach(function(b){
    b.addEventListener('click', function(){
      chart.setAttribute('data-inst', b.dataset.inst);
      document.querySelectorAll('.insttabs button').forEach(function(x){ x.classList.remove('on'); });
      b.classList.add('on');
    });
  });

  // ---- spotlight (root / third / fifth) ----
  var degBtns=document.querySelectorAll('.degs button');
  degBtns.forEach(function(b){
    b.addEventListener('click', function(){
      var on=b.classList.contains('on');
      degBtns.forEach(function(x){ x.classList.remove('on'); });
      if(on){ chart.removeAttribute('data-hl'); }
      else { chart.setAttribute('data-hl', b.dataset.deg); b.classList.add('on'); }
    });
  });
})();
</script>
</body>
</html>
